syntax = "proto3";

package configcenter.v1;

import "google/api/annotations.proto";

option go_package = "mini-nacos/api/configcenter/v1;v1";

service ConfigCenter {
  rpc PublishConfig (PublishConfigRequest) returns (PublishConfigResponse) {
    option (google.api.http) = {
      post: "/v1/configs"
      body: "*"
    };
  }

  rpc GetConfig (GetConfigRequest) returns (GetConfigResponse) {
    option (google.api.http) = {
      get: "/v1/configs"
    };
  }

  rpc ListenConfig (ListenConfigRequest) returns (ListenConfigResponse) {
    option (google.api.http) = {
      post: "/v1/configs/listen"
      body: "*"
    };
  }
}

// publish
message PublishConfigRequest {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
  string content = 4;
}

message PublishConfigResponse {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
  string content = 4;
  string md5 = 5;
}

// config
message GetConfigRequest {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
}

message GetConfigResponse {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
  string content = 4;
  string md5 = 5;
}

// listen
message ListenConfigRequest {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
  string md5 = 4;
  int64 timeout_ms = 5;
}

message ListenConfigResponse {
  string namespace = 1;
  string group = 2;
  string data_id = 3;
  string md5 = 4;
  bool changed = 5;
}
